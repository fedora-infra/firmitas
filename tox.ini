[tox]
minversion = 3.9.0
envlist = py{39,310,311,312,313,314},cleaning
isolated_build = true
skip_missing_interpreters = true

[testenv]
setenv =
    PYTHONPATH={toxinidir}
passenv =
skip_install = true
sitepackages = false
allowlist_externals =
    uv
    firmitas
commands_pre =
    uv sync --active
    firmitas --version
commands =
    uv run --active pytest -s -vvv -o "addopts=--cov=firmitas --cov-report=term --cov-report=term-missing --cov-report=xml --cov-report=html" test/

[testenv:cleaning]
commands =
    uv run --active ruff check firmitas/ test/
