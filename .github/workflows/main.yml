---
name: firmitas
on: push
jobs:
  ci-basic:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    container: fedorapython/fedora-python-tox:latest
    steps:
      - uses: actions/checkout@v5

      - name: Install the base dependencies
        run: |
             python3 -m pip install --upgrade poetry tox

      - name: Check the correctness of the project config
        run: |
           poetry check

      - name: Check the quality of the code
        run: |
             tox -e cleaning

  ci-tests:
    strategy:
      fail-fast: false
      matrix:
        tox-env: ["py39", "py310", "py311", "py312", "py313", "py314"]
    runs-on: ubuntu-latest
    container: fedorapython/fedora-python-tox:latest
    steps:
      - uses: actions/checkout@v5

      - name: Install the base dependencies
        run: |
             dnf install -y libffi-devel
             python3 -m pip install --upgrade tox

      - name: Set up user for running the testcases
        run: |
             useradd testrunner
             chown -R testrunner .

      - name: Execute tox
        run: |
             su testrunner -c "tox -e ${{ matrix.tox-env }}"
